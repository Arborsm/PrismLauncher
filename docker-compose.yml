version: '3.8'

services:
  # Core后端服务
  prism-core:
    build:
      context: .
      dockerfile: Dockerfile.core
    container_name: prism-core
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./instances:/app/instances
    environment:
      - LOG_LEVEL=info
      - DATA_PATH=/app/data
      - INSTANCES_PATH=/app/instances
    restart: unless-stopped
    networks:
      - prism-network

  # 前端开发服务器
  prism-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: prism-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://prism-core:8080
    depends_on:
      - prism-core
    restart: unless-stopped
    networks:
      - prism-network

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: prism-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - prism-network

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: prism-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - prism-core
      - prism-frontend
    restart: unless-stopped
    networks:
      - prism-network

volumes:
  redis-data:

networks:
  prism-network:
    driver: bridge